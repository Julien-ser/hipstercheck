# Training Configuration for Phi-2 Fine-Tuning

model:
  name: "microsoft/phi-2"
  trust_remote_code: true
  dtype: "float16"

lora:
  r: 16
  lora_alpha: 32
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "dense"
    - "fc1"
    - "fc2"
  lora_dropout: 0.1
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  train_file: "dataset/split_train.jsonl"
  val_file: "dataset/split_val.jsonl"
  test_file: "dataset/split_test.jsonl"

  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 1
  optim: "adamw_torch"
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"

  fp16: true
  bf16: false
  gradient_checkpointing: true
  tf32: true

  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  save_total_limit: 3

  output_dir: "./checkpoints/phi2-code-review"
  overwrite_output_dir: true

  eval_strategy: "steps"
  save_strategy: "steps"
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false

tokenizer:
  max_length: 2048
  truncation: true
  padding: "max_length"

inference:
  max_new_tokens: 512
  temperature: 0.2
  top_p: 0.9
  repetition_penalty: 1.1
  do_sample: false

use_gpu: false
fp16: false
gradient_checkpointing: false

data_collator:
  label_pad_token_id: -100
  pad_to_multiple_of: 8
