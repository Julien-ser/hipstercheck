# Training Configuration for Phi-2 Fine-Tuning
# Configuration for fine-tuning Phi-2 on code review generation

model:
  # Base model from Hugging Face
  name: "microsoft/phi-2"
  # Trust remote code for Phi-2
  trust_remote_code: true
  # Model dtype for training
  dtype: "float16"  # Use bf16 if GPU supports it

# LoRA configuration for efficient fine-tuning
lora:
  r: 16                # LoRA rank
  lora_alpha: 32       # LoRA alpha (typically 2x r)
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "dense"
    - "fc1"
    - "fc2"
  lora_dropout: 0.1
  bias: "none"         # Don't train bias parameters
  task_type: "CAUSAL_LM"

# Training hyperparameters
training:
  # Dataset paths
  train_file: "dataset/split_train.jsonl"
  val_file: "dataset/split_val.jsonl"
  test_file: "dataset/split_test.jsonl"

  # Training settings
  num_train_epochs: 1
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 1
  optim: "adamw_torch"
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"

  # Mixed precision and optimization
  fp16: true           # Use mixed precision (False for CPU)
  bf16: false          # Use BF16 if GPU supports (Ampere+)
  gradient_checkpointing: true  # Save memory
  tf32: true           # Use TF32 on Ampere GPUs

  # Logging and saving
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  save_total_limit: 3

  # Output
  output_dir: "./checkpoints/phi2-code-review"
  overwrite_output_dir: true

  # Evaluation strategy
  evaluation_strategy: "steps"
  save_strategy: "steps"
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false

# Tokenizer settings
tokenizer:
  max_length: 2048
  truncation: true
  padding: "max_length"

# Inference settings
inference:
  max_new_tokens: 512
  temperature: 0.2
  top_p: 0.9
  repetition_penalty: 1.1
  do_sample: false  # Use greedy decoding for consistent outputs

# Hardware
# Set to false for CPU training, true for GPU
use_gpu: true

# For CPU training, set these:
# fp16: false
# gradient_checkpointing: false

# Data collator settings
data_collator:
  # For causal LM, we need to shift labels
  label_pad_token_id: -100
  pad_to_multiple_of: 8
