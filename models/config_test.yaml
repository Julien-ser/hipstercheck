# Test Configuration for Quick Training Validation

model:
  name: "microsoft/phi-2"
  trust_remote_code: true
  torch_dtype: "float16"
  max_seq_length: 512

lora:
  r: 16
  lora_alpha: 32
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "dense"
    - "fc1"
    - "fc2"
  lora_dropout: 0.1
  bias: "none"
  task_type: "CAUSAL_LM"

dataset:
  train_file: "dataset/split_train_tiny.jsonl"
  validation_file: "dataset/split_val_tiny.jsonl"
  test_file: "dataset/split_test_tiny.jsonl"

  prompt_template: |
    [INST] <<SYS>>
    You are an expert Python code reviewer specializing in PEP8, best practices, and common bugs.

    Analyze this Python code and identify:
    1. Style violations (PEP8)
    2. Potential bugs or errors
    3. Performance issues
    4. Security vulnerabilities
    5. Best practice violations

    Focus on:
    - Unused variables/imports
    - Missing type hints
    - Incorrect indentation
    - Poor naming conventions
    - Inefficient algorithms (O(n²) loops, unnecessary copies)
    - Hardcoded secrets
    - Missing error handling
    - Deprecated library usage

    Code:
    {code}

    Provide a review in exact JSON format (no extra text):
    {{
      "severity": "high|medium|low",
      "line_number": <int, or 0 if general>,
      "category": "bug|optimization|style|security|best_practice",
      "suggestion": "<concise actionable suggestion, max 100 chars>",
      "explanation": "<detailed explanation, 2-3 sentences>",
      "code_example": "<optional corrected code snippet>"
    }}

    Review: [/INST]

  response_template: |
    {review_json}

training:
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  optim: "adamw_torch"
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  warmup_steps: 5
  lr_scheduler_type: "cosine"

  fp16: false
  bf16: false
  gradient_checkpointing: true
  tf32: true

  logging_steps: 1
  save_steps: 2
  eval_steps: 2
  save_total_limit: 1

output:
  output_dir: "./checkpoints/phi2-code-review-test"
  logging_dir: "./logs_test"
  overwrite_output_dir: true
  push_to_hub: false

  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
